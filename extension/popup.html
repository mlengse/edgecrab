<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raindrop.io Exporter</title>
<style>
/* ── Reset & base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  width: 360px; min-height: 480px; max-height: 600px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f9fafb; color: #1a1a2e; overflow: hidden;
  display: flex; flex-direction: column;
}

/* ── Header ── */
.header {
  background: #fff; border-bottom: 1px solid #e5e7eb;
  padding: 12px 14px 10px;
  display: flex; align-items: center; gap: 8px;
}
.header-logo { font-size: 18px; }
.header-title { font-size: 14px; font-weight: 700; flex: 1; color: #1a1a2e; }
.btn-link {
  font-size: 11px; color: #6b7280; background: none;
  border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px;
}
.btn-link:hover { background: #f3f4f6; color: #374151; }

/* ── Scroll container ── */
.scroll {
  flex: 1; overflow-y: auto; padding: 12px 14px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ── Resume banner ── */
#resumeBanner {
  display: none; /* toggled by JS */
  background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px;
  padding: 9px 11px; flex-direction: column; gap: 7px;
}
.resume-title { font-size: 12px; font-weight: 700; color: #92400e; }
#resumeLabel { font-size: 11px; color: #78350f; line-height: 1.4; }
.resume-actions { display: flex; gap: 6px; }
.btn-resume {
  flex: 1; padding: 6px; border-radius: 6px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; background: #f59e0b; color: #fff;
}
.btn-resume:hover { background: #d97706; }
.btn-discard {
  padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid #fcd34d; background: transparent; color: #92400e;
}
.btn-discard:hover { background: #fef3c7; }

/* ── Section card ── */
.card {
  background: #fff; border: 1px solid #e5e7eb;
  border-radius: 8px; padding: 11px 12px;
}
.card-title { font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
  color: #6b7280; margin-bottom: 7px; font-weight: 600; }

/* ── Token row ── */
.token-row { display: flex; gap: 6px; }
.token-input {
  flex: 1; border: 1px solid #e5e7eb; border-radius: 6px;
  padding: 6px 8px; font-size: 12px; color: #1a1a2e;
  background: #f9fafb; font-family: monospace;
  outline: none; transition: border-color .15s;
}
.token-input:focus { border-color: #0066ff; background: #fff; }
.btn-save {
  padding: 6px 10px; border-radius: 6px; border: none;
  background: #0066ff; color: #fff; font-size: 12px;
  font-weight: 600; cursor: pointer; white-space: nowrap;
}
.btn-save:hover { background: #0055dd; }
.token-status {
  font-size: 11px; margin-top: 4px; min-height: 14px; color: #6b7280;
}
.token-status.ok  { color: #16a34a; }
.token-status.err { color: #dc2626; }
.token-status.warn { color: #d97706; }
.token-help { font-size: 10.5px; color: #9ca3af; margin-top: 4px; }
.token-help a { color: #0066ff; text-decoration: none; }

/* ── Format selector ── */
.fmt-row { display: flex; gap: 6px; flex-wrap: wrap; }
.fmt-btn {
  padding: 5px 10px; border-radius: 99px; font-size: 12px; cursor: pointer;
  border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280;
  transition: all .12s; font-weight: 500;
}
.fmt-btn:hover { border-color: #0066ff; color: #0066ff; }
.fmt-btn.active { background: #0066ff; border-color: #0066ff; color: #fff; }

/* ── Scope selector ── */
.scope-sel {
  width: 100%; padding: 6px 8px; border: 1px solid #e5e7eb;
  border-radius: 6px; background: #f9fafb; color: #1a1a2e;
  font-size: 12px; cursor: pointer; outline: none;
}

/* ── Progress ── */
#progressWrap { display: none; }
.progress-track {
  height: 6px; background: #e5e7eb; border-radius: 3px; overflow: hidden; margin-bottom: 4px;
}
.progress-fill {
  height: 100%; background: #0066ff; border-radius: 3px;
  transition: width .3s ease; width: 0%;
}
#progressLabel { font-size: 11px; color: #6b7280; }

/* ── Status message ── */
#statusMsg { font-size: 12px; min-height: 16px; color: #374151; }

/* ── Action buttons ── */
.action-row { display: flex; gap: 8px; margin-top: 2px; }
.btn-export {
  flex: 1; padding: 9px; border-radius: 8px; border: none;
  background: #0066ff; color: #fff; font-size: 13px;
  font-weight: 700; cursor: pointer; transition: background .15s;
}
.btn-export:hover:not(:disabled)  { background: #0055dd; }
.btn-export:disabled { background: #93c5fd; cursor: not-allowed; }
.btn-abort {
  display: none;
  padding: 9px 12px; border-radius: 8px; border: 1px solid #e5e7eb;
  background: #fff; color: #dc2626; font-size: 13px;
  font-weight: 600; cursor: pointer;
}
.btn-abort:hover:not(:disabled) { background: #fee2e2; }

/* ── Footer ── */
.footer {
  border-top: 1px solid #e5e7eb; padding: 7px 14px;
  display: flex; justify-content: space-between; align-items: center;
  background: #fff;
}
.footer-info { font-size: 10.5px; color: #9ca3af; }
.footer-info a { color: #0066ff; text-decoration: none; }
</style>
</head>
<body>

<!-- ── Header ── -->
<div class="header">
  <span class="header-logo">🔖</span>
  <span class="header-title">Raindrop Exporter</span>
  <button id="btnSettings" class="btn-link">⚙ Settings</button>
</div>

<!-- ── Scrollable body ── -->
<div class="scroll">

  <!-- Resume Banner -->
  <div id="resumeBanner">
    <div class="resume-title">↺ Interrupted export found</div>
    <div id="resumeLabel">Loading…</div>
    <div class="resume-actions">
      <button id="btnResume"  class="btn-resume">Resume export</button>
      <button id="btnDiscard" class="btn-discard">Discard</button>
    </div>
  </div>

  <!-- Token -->
  <div class="card">
    <div class="card-title">API Token</div>
    <div class="token-row">
      <input id="inputToken" class="token-input" type="password"
             placeholder="Paste your Raindrop.io token…" autocomplete="off">
      <button id="btnSaveToken" class="btn-save">Save</button>
    </div>
    <div id="tokenStatus" class="token-status warn">No token saved</div>
    <div class="token-help">
      Get token: <a href="https://app.raindrop.io/settings/integrations" target="_blank">app.raindrop.io/settings/integrations</a>
      → Create test token
    </div>
  </div>

  <!-- Export scope -->
  <div class="card">
    <div class="card-title">Export scope</div>
    <select id="selectScope" class="scope-sel">
      <option value="all">All bookmarks (collection 0)</option>
      <option value="-1">Unsorted only</option>
    </select>
  </div>

  <!-- Formats -->
  <div class="card">
    <div class="card-title">Export formats</div>
    <div class="fmt-row">
      <button class="fmt-btn active"  data-fmt="json">    JSON       </button>
      <button class="fmt-btn"         data-fmt="html">    HTML       </button>
      <button class="fmt-btn"         data-fmt="markdown">Markdown   </button>
      <button class="fmt-btn active"  data-fmt="offline"> Offline SPA</button>
    </div>
  </div>

  <!-- Progress -->
  <div id="progressWrap" class="card">
    <div class="progress-track">
      <div id="progressBar" class="progress-fill"></div>
    </div>
    <div id="progressLabel">Waiting…</div>
  </div>

  <!-- Status -->
  <div id="statusMsg"></div>

  <!-- Action buttons -->
  <div class="action-row">
    <button id="btnExport" class="btn-export">⬇ Export bookmarks</button>
    <button id="btnAbort"  class="btn-abort">⏸ Pause</button>
  </div>

</div><!-- /scroll -->

<!-- ── Footer ── -->
<div class="footer">
  <span class="footer-info">Saves to ~/Downloads · <a href="https://app.raindrop.io" target="_blank">Raindrop.io</a></span>
  <span class="footer-info">v2.0</span>
</div>

<script type="module" src="popup.js"></script>
</body>
</html>
